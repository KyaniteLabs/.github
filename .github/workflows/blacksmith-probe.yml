name: Reusable Blacksmith Probe

on:
  workflow_call:
    inputs:
      probe_label:
        description: Label printed in the run summary.
        required: false
        type: string
        default: org-probe

permissions:
  contents: read

jobs:
  probe:
    name: Blacksmith Probe
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Runner identity
        run: |
          set -euo pipefail
          echo "probe_label=${{ inputs.probe_label }}"
          echo "repo=${GITHUB_REPOSITORY}"
          echo "runner=${RUNNER_NAME:-unknown}"
          echo "runner_os=${RUNNER_OS:-unknown}"
          echo "runner_arch=${RUNNER_ARCH:-unknown}"
          uname -a
          git --version
          python3 --version
          node --version 2>/dev/null || true
          go version 2>/dev/null || true

      - name: Repository shape
        run: |
          set -euo pipefail
          printf 'default_branch=%s\n' "${GITHUB_REF_NAME:-unknown}"
          find . -maxdepth 2 -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            | sort \
            | sed -n '1,80p'
