name: Reusable Blacksmith Go Smoke

on:
  workflow_call:
    inputs:
      package_pattern:
        description: Go package pattern to test.
        required: false
        type: string
        default: ./...
      build_package:
        description: Go package to build as a smoke check.
        required: false
        type: string
        default: ./...

permissions:
  contents: read

jobs:
  go-smoke:
    name: Blacksmith Go Smoke
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Runner identity
        run: |
          set -euo pipefail
          echo "repo=${GITHUB_REPOSITORY}"
          echo "runner=${RUNNER_NAME:-unknown}"
          echo "runner_os=${RUNNER_OS:-unknown}"
          echo "runner_arch=${RUNNER_ARCH:-unknown}"
          uname -a
          go version
          git --version

      - name: Verify modules
        run: |
          set -euo pipefail
          go mod download
          go mod verify

      - name: Run Go tests
        run: go test ${{ inputs.package_pattern }}

      - name: Build smoke
        run: go build ${{ inputs.build_package }}
