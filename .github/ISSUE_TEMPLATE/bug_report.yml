name: Bug Report
description: Report something that isn't working correctly
title: "Bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! This issue will be labeled `needs-triage` automatically.
        Maintainers will review and add the `approved` label if accepted. Our automated pipeline will then create a fix.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `...`
        2. With input `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste the full error message or traceback
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: e.g. 1.3.1
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, FFmpeg version, etc.
      placeholder: |
        - OS:
        - Python:
        - FFmpeg:
