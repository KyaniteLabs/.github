name: Blacksmith Go Smoke

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/blacksmith-go-smoke.yml'
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'

permissions:
  contents: read

jobs:
  go-smoke:
    uses: KyaniteLabs/.github/.github/workflows/blacksmith-go-smoke.yml@main
